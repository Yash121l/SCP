services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scp_portal
      POSTGRES_USER: scp
      POSTGRES_PASSWORD: scp
    volumes:
      - scp-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scp -d scp_portal"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      COOKIE_SECRET: ${COOKIE_SECRET:-change-this-cookie-secret-to-at-least-32-chars}
      DATABASE_URL: postgres://scp:scp@postgres:5432/scp_portal
      FRONTEND_ORIGIN: https://${DOMAIN:-scp.yashlunawat.com}
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret-to-at-least-32-chars}
      NODE_ENV: production
      PORT: 4000
    ports:
      - "127.0.0.1:4000:4000"
    command: >
      sh -c "pnpm --filter @scp/database db:migrate &&
             pnpm --filter @scp/database db:seed &&
             node apps/server/dist/main.js"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "127.0.0.1:5173:80"

volumes:
  scp-postgres:
