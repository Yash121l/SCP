services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scp
      POSTGRES_PASSWORD: scp
      POSTGRES_DB: scp_portal
    ports:
      - "5432:5432"
    volumes:
      - scp_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scp -d scp_portal"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://scp:scp@postgres:5432/scp_portal
      API_PORT: 4000
      NODE_ENV: development
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_URL: http://127.0.0.1:4000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  scp_postgres:
