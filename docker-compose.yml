services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scp_portal
      POSTGRES_USER: scp
      POSTGRES_PASSWORD: scp
    ports:
      - "5432:5432"
    volumes:
      - scp-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scp -d scp_portal"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      COOKIE_SECRET: dev-cookie-secret-for-compose-scp-portal-change
      DATABASE_URL: postgres://scp:scp@postgres:5432/scp_portal
      FRONTEND_ORIGIN: http://localhost:5173
      JWT_SECRET: dev-jwt-secret-for-compose-scp-portal-change-now
      NODE_ENV: development
      PORT: 4000
    ports:
      - "4000:4000"
    command: >
      sh -c "pnpm --filter @scp/database db:migrate &&
             pnpm --filter @scp/database db:seed &&
             node apps/server/dist/main.js"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  scp-postgres:
